<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScepterNGD Minecraft Server</title>

<!-- Favicons -->
<link rel="icon" type="image/x-icon" href="photo/favicon_io/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="photo/favicon_io/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="photo/favicon_io/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="photo/favicon_io/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="photo/favicon_io/android-chrome-512x512.png">
<link rel="apple-touch-icon" sizes="180x180" href="photo/favicon_io/apple-touch-icon.png">

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
  margin: 0;
  background: #0b0f1a;
  color: #fff;
  text-align: center;
}

/* ===== Glow Animation (shared) ===== */
@keyframes glowPulse {
  0%, 100% { 
    box-shadow: 
      0 0 10px rgba(0,255,255,.25),
      0 0 30px rgba(0,255,255,.15),
      0 0 50px rgba(0,255,255,.05);
  }
  50% { 
    box-shadow: 
      0 0 25px rgba(0,255,255,.45),
      0 0 50px rgba(0,255,255,.3),
      0 0 80px rgba(0,255,255,.1);
  }
}

/* ===== Container ===== */
.container {
  max-width: 420px;
  margin: 30px auto;
  padding: 22px;
  border-radius: 22px;
  background: linear-gradient(145deg,#0e1324,#070a14);
  animation: glowPulse 2.5s infinite alternate;
  position: relative;
}

/* ===== Soft Neon Edge via Pseudo Element ===== */
.container::before {
  content: '';
  position: absolute;
  top: -5px; left: -5px; right: -5px; bottom: -5px;
  border-radius: 27px;
  background: linear-gradient(45deg, #00ffff, #00b3ff);
  filter: blur(12px);
  opacity: 0.4;
  z-index: -1;
}

/* ===== Logo ===== */
.logo {
  width: 150px;
  margin-bottom: 10px;
}

/* ===== Title ===== */
h1 {
  margin: 10px 0 6px;
  font-size: 26px;
}

/* ===== Version Badge with Tooltip ===== */
.version {
  display: inline-block;
  padding: 4px 12px;
  font-size: 12px;
  border-radius: 20px;
  background: rgba(0,255,255,.15);
  border: 1px solid rgba(0,255,255,.4);
  margin-bottom: 12px;
  cursor: default;
  position: relative;
}

.version:hover::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: 125%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.85);
  color: #00ffff;
  padding: 6px 10px;
  border-radius: 6px;
  white-space: nowrap;
  font-size: 10px;
  opacity: 0.95;
  pointer-events: none;
  z-index: 10;
}

/* ===== Status ===== */
.status {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  margin-bottom: 10px;
}
.status[role="status"] {
  aria-live: polite;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: red;
  box-shadow: 0 0 10px red;
}

/* ===== Player Bar ===== */
.player-bar {
  width: 100%;
  height: 14px;
  background: #1a1f36;
  border-radius: 10px;
  overflow: hidden;
  margin: 10px 0 4px;
}

.player-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#00ffff,#00b3ff);
  transition: width 0.4s ease-in-out;
}

.player-text {
  font-size: 13px;
  opacity: .85;
}

/* ===== Join Button with Neon Glow ===== */
button {
  width: 100%;
  margin: 14px 0;
  padding: 15px;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 14px;
  color: #000;
  cursor: pointer;
  background: linear-gradient(90deg,#00ffff,#00b3ff);
  animation: glowPulse 2.5s infinite alternate;
  position: relative;
  z-index: 1;
}

/* Neon edge for button via pseudo element */
button::before {
  content: '';
  position: absolute;
  top: -4px; left: -4px; right: -4px; bottom: -4px;
  border-radius: 18px;
  background: linear-gradient(45deg, #00ffff, #00b3ff);
  filter: blur(10px);
  opacity: 0.35;
  z-index: -1;
}

/* ===== Footer ===== */
.small {
  margin-top: 14px;
  font-size: 12px;
  opacity: .7;
}

/* ===== Responsive Text Scaling ===== */
@media (max-width: 380px) {
  h1 { font-size: 22px; }
  .version { font-size: 11px; padding: 3px 10px; }
  .player-text { font-size: 12px; }
  button { font-size: 15px; padding: 12px; }
}
</style>
</head>

<body>

<div class="container">

  <img src="photo/NGD MC LOGO26 V1.png" class="logo" alt="ScepterNGD Logo">

  <h1>ScepterNGD</h1>

  <div class="version" data-tooltip="Map: Survival Island • Rules: No griefing, Be respectful, Economy enabled">
    Bedrock • Survival • Economy • v1.26
  </div>

  <div class="status" role="status" aria-live="polite">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Checking status...</span>
  </div>

  <div class="player-bar">
    <div class="player-fill" id="playerFill"></div>
  </div>
  <div class="player-text" id="playerText">Players: -- / --</div>

  <button onclick="joinServer()">Join Server</button>

  <div class="small">
    ✔ Android • iOS • Windows Bedrock<br>
    ✖ Consoles & Java Edition
  </div>

</div>

<script>
const ip = "scepterngd19.minecra.fr";
const port = 25798;
const maxPlayers = 20;

/* ===== DIRECT JOIN ===== */
function joinServer(){
  window.location.href = `minecraft://?addExternalServer=ScepterNGD|${ip}:${port}`;
}

/* ===== UNIVERSAL SERVER STATUS ===== */
async function updateStatus(){
  try{
    const endpoints = [
      `https://api.mcsrvstat.us/bedrock/3/${ip}`,
      `https://api.mcsrvstat.us/bedrock/3/${ip}:${port}`
    ];

    const responses = await Promise.allSettled(
      endpoints.map(url => fetch(url).then(r => r.json()))
    );

    const data = responses
      .filter(r => r.status === "fulfilled")
      .map(r => r.value)
      .find(d => d.online === true);

    if(!data) throw "offline";

    statusDot.style.background = "#00ff99";
    statusDot.style.boxShadow = "0 0 12px #00ff99";
    statusText.textContent = "Online";

    const online = data.players?.online || 0;
    playerText.textContent = `Players: ${online} / ${maxPlayers}`;
    playerFill.style.width = `${Math.min(100,(online/maxPlayers)*100)}%`;

  } catch {
    statusDot.style.background = "red";
    statusDot.style.boxShadow = "0 0 12px red";
    statusText.textContent = "Offline";
    playerText.textContent = `Players: 0 / ${maxPlayers}`;
    playerFill.style.width = "0%";
  }
}

updateStatus();
setInterval(updateStatus, 60000);
</script>

</body>
</html>
